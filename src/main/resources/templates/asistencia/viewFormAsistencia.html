<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="form-card w-100 mx-auto" style="max-width: 560px;">
                <div class="mb-4 text-center">
                    <h3 class="mb-1" th:text="${isEdit} ? 'Editar Asistencia' : 'Agregar Asistencia'"></h3>
                    <p class="text-body-secondary fs-6 mb-0">Registra o edita una asistencia individual.</p>
                </div>

                <form method="post"
                      th:object="${asistencia}"
                      th:action="${isEdit} ? @{/asistencia/actualizar/{id}(id=${asistencia.id})} : @{/asistencia/guardar}">

                    <div class="mb-3" th:if="${asistencia.id != null}">
                        <label class="form-label">ID</label>
                        <input type="number" class="form-control" th:field="*{id}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sesión</label>
                        <div class="entity-picker"
                             data-entity="sesion"
                             data-placeholder="Selecciona una sesión..."
                             th:data-current-id="${asistencia.sesion != null ? asistencia.sesion.id : ''}"
                             th:data-current-text="${asistencia.sesion != null ? 'Semana ' + asistencia.sesion.semana + (asistencia.sesion.grupo != null ? ' — ' + asistencia.sesion.grupo.nombre : '') : ''}"
                             th:data-current-sub="${asistencia.sesion != null ? asistencia.sesion.estatusRegistro : ''}">
                            <input type="hidden" name="sesion.id"
                                   th:value="${asistencia.sesion != null ? asistencia.sesion.id : ''}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tutorado</label>
                        <div class="entity-picker"
                             data-entity="tutorado"
                             data-placeholder="Selecciona un tutorado..."
                             th:data-current-id="${asistencia.tutorado != null ? asistencia.tutorado.id : ''}"
                             th:data-current-text="${asistencia.tutorado != null ? asistencia.tutorado.nombre + ' ' + asistencia.tutorado.apellido : ''}"
                             th:data-current-sub="${asistencia.tutorado != null ? asistencia.tutorado.numeroControl : ''}"
                             th:data-current-foto="${asistencia.tutorado != null and asistencia.tutorado.foto != null ? asistencia.tutorado.foto : ''}">
                            <input type="hidden" name="tutorado.id"
                                   th:value="${asistencia.tutorado != null ? asistencia.tutorado.id : ''}">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="presente" class="form-label">Presente</label>
                            <select class="form-select" id="presente" th:field="*{presente}">
                                <option value="1">Sí</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="recuperada" class="form-label">Recuperada</label>
                            <select class="form-select" id="recuperada" th:field="*{recuperada}">
                                <option value="0">No</option>
                                <option value="1">Sí</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a th:href="@{/asistencia}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>

                </form>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/entity-picker.js}"></script>
<script th:src="@{/js/custom-select.js}"></script>
</body>
</html>
