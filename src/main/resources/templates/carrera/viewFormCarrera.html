<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Editar Carrera' : 'Agregar Carrera'">Formulario Carrera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 480px;">

                <!-- Encabezado -->
                <div class="mb-4">
                    <h3 class="mb-1" th:text="${isEdit} ? 'Editar Carrera' : 'Agregar Carrera'"></h3>
                    <p class="text-body-secondary fs-6 mb-0">
                        Registra o actualiza una carrera del tecnológico para asignarla a grupos y tutorados.
                    </p>
                </div>
                <p class="text-body-secondary small mb-4">
                    Los campos marcados con <span class="text-danger fw-bold">*</span> son obligatorios.
                </p>

                <!-- Alertas -->
                <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                    <span th:text="${msg_error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form method="post"
                      th:object="${carrera}"
                      th:action="${isEdit} ? @{/carrera/actualizar/{id}(id=${carrera.id})} : @{/carrera/guardar}">

                    <div class="mb-3" th:if="${carrera.id != null}">
                        <label class="form-label">ID</label>
                        <input type="number" class="form-control" th:field="*{id}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="nombre" class="form-label">
                            Nombre <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="nombre"
                               class="form-control"
                               th:field="*{nombre}"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                               pattern="[a-zA-ZáéíóúÁÉÍÓÚüÜñÑ ]+"
                               title="Solo letras y espacios"
                               placeholder="ej. Ingeniería en Sistemas Computacionales">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="clave" class="form-label">
                            Clave <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="clave"
                               class="form-control"
                               th:field="*{clave}"
                               th:classappend="${#fields.hasErrors('clave')} ? 'is-invalid'"
                               pattern="[a-zA-Z0-9]+"
                               title="Solo letras y números, sin espacios"
                               placeholder="ej. ISC">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('clave')}" th:errors="*{clave}"></div>
                        <div class="form-text">Abreviatura oficial de la carrera.</div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a th:href="@{/carrera}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${isEdit} ? 'Actualizar' : 'Guardar'"></span>
                        </button>
                    </div>

                </form>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
