<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Grupo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main">

            <div class="page-header">
                <div>
                    <h3 class="mb-1" th:text="${grupo.nombre}">Grupo</h3>
                    <p class="text-body-secondary fs-6 mb-0"
                       th:text="(${grupo.carrera != null} ? ${grupo.carrera.nombre} : '') + ' — ' + (${grupo.semestre != null} ? ${grupo.semestre.periodo} + ' ' + ${grupo.semestre.anio} : '')">
                    </p>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/grupo/actualizar/{id}(id=${grupo.id})}" class="btn btn-primary">Editar</a>
                    <a th:href="@{/grupo}" class="btn btn-secondary">Volver</a>
                </div>
            </div>

            <div th:if="${msg_success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg_success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${msg_error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">

                <!-- Datos del grupo -->
                <div class="col-md-5">
                    <div class="card bg-body-secondary border-0 h-100">
                        <div class="card-body p-4">
                            <h5 class="mb-3">Datos del Grupo</h5>
                            <div class="detail-row">
                                <span class="detail-label">ID</span>
                                <span class="detail-value" th:text="${grupo.id}"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Nombre</span>
                                <span class="detail-value" th:text="${grupo.nombre}"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Tutor</span>
                                <span class="detail-value"
                                      th:text="${grupo.tutor != null} ? ${grupo.tutor.nombre} + ' ' + ${grupo.tutor.apellido} : 'Sin tutor'"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Carrera</span>
                                <span class="detail-value"
                                      th:text="${grupo.carrera != null} ? ${grupo.carrera.nombre} : 'Sin carrera'"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Semestre</span>
                                <span class="detail-value"
                                      th:text="${grupo.semestre != null} ? ${grupo.semestre.periodo} + ' ' + ${grupo.semestre.anio} : 'Sin semestre'"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Aula</span>
                                <span class="detail-value" th:text="${grupo.aula != null} ? ${grupo.aula} : '---'"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Día</span>
                                <span class="detail-value" th:text="${grupo.diaSemana != null} ? ${grupo.diaSemana} : '---'"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Horario</span>
                                <span class="detail-value" th:text="${grupo.horario != null} ? ${grupo.horario} : '---'"></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Estado</span>
                                <span class="badge rounded-pill"
                                      th:text="${grupo.activo == 1} ? 'Activo' : 'Inactivo'"
                                      th:classappend="${grupo.activo == 1} ? 'badge-active' : 'badge-inactive'">
                                </span>
                            </div>
                            <div class="detail-row" th:if="${grupo.fechaRegistro != null}">
                                <span class="detail-label">Registrado</span>
                                <span class="detail-value">
                                    <div th:data-ts="${grupo.fechaRegistro.time}">
                                        <span class="rel-badge badge rounded-pill badge-sin-asignar">...</span>
                                        <small class="d-block text-body-secondary mt-1"
                                               th:text="${#dates.format(grupo.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></small>
                                    </div>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tutorados del grupo -->
                <div class="col-md-7">
                    <div class="card bg-body-secondary border-0">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0">Tutorados del Grupo</h5>
                                <a th:href="@{/grupo/asignar/{id}(id=${grupo.id})}" class="btn btn-sm btn-primary">
                                    Asignar Tutorados
                                </a>
                            </div>

                            <div th:if="${tutorados != null and !#lists.isEmpty(tutorados)}">
                                <div class="table-wrapper">
                                    <table class="table">
                                        <thead>
                                        <tr>
                                            <th>Tutorado</th>
                                            <th>No. Control</th>
                                            <th>Estado</th>
                                            <th></th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="item : ${tutorados}">
                                            <td>
                                                <div class="d-flex align-items-center gap-2">
                                                    <img th:if="${item.tutorado.foto != null}"
                                                         th:src="@{/tutorado/{foto}(foto=${item.tutorado.foto})}"
                                                         alt="Foto"
                                                         class="avatar avatar-sm">
                                                    <img th:unless="${item.tutorado.foto != null}"
                                                         th:src="@{|https://ui-avatars.com/api/?background=random&color=fff&rounded=true&bold=true&name=${item.tutorado.nombre}+${item.tutorado.apellido}|}"
                                                         alt="Sin foto"
                                                         class="avatar avatar-sm">
                                                    <span th:text="${item.tutorado.nombre} + ' ' + ${item.tutorado.apellido}"></span>
                                                </div>
                                            </td>
                                            <td class="text-body-secondary" th:text="${item.tutorado.numeroControl}"></td>
                                            <td>
                                                <span class="badge rounded-pill"
                                                      th:text="${item.tutorado.activo == 1} ? 'Activo' : 'Inactivo'"
                                                      th:classappend="${item.tutorado.activo == 1} ? 'badge-active' : 'badge-inactive'">
                                                </span>
                                            </td>
                                            <td>
                                                <form th:action="@{/grupo/tutorado/quitar/{id}(id=${item.id})}"
                                                      method="post" style="display:inline;">
                                                    <input type="hidden" name="idGrupo" th:value="${grupo.id}">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                                            onclick="return confirm('¿Quitar este tutorado del grupo?')">
                                                        Quitar
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div th:unless="${tutorados != null and !#lists.isEmpty(tutorados)}"
                                 class="text-center py-4 text-body-secondary">
                                <p class="mb-2">No hay tutorados asignados a este grupo.</p>
                                <a th:href="@{/grupo/asignar/{id}(id=${grupo.id})}" class="btn btn-sm btn-outline-primary">
                                    Asignar ahora
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/rel-time.js}"></script>
</body>
</html>
