<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 600px;">

                <!-- Encabezado -->
                <div class="mb-4">
                    <h3 class="mb-1">Asignar Tutor</h3>
                    <p class="text-body-secondary fs-6 mb-0">
                        Selecciona el tutor responsable para este grupo de tutoría.
                    </p>
                </div>

                <!-- Alertas -->
                <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                    <span th:text="${msg_error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Info del grupo -->
                <div class="glass-surface p-3 mb-4 rounded-3">
                    <h6 class="text-body-secondary mb-3 fw-semibold text-uppercase" style="font-size:.72rem;letter-spacing:.06em;">
                        Información del Grupo
                    </h6>
                    <div class="row g-2">
                        <div class="col-6">
                            <small class="text-body-secondary d-block">Nombre</small>
                            <span class="fw-semibold" th:text="${grupo.nombre}"></span>
                        </div>
                        <div class="col-6">
                            <small class="text-body-secondary d-block">Semestre</small>
                            <span th:text="${grupo.semestre != null} ? ${grupo.semestre.periodo} + ' ' + ${grupo.semestre.anio} : '—'"></span>
                        </div>
                        <div class="col-6">
                            <small class="text-body-secondary d-block">Carrera</small>
                            <span th:text="${grupo.carrera != null} ? ${grupo.carrera.nombre} : '—'"></span>
                        </div>
                        <div class="col-6">
                            <small class="text-body-secondary d-block">Aula / Horario</small>
                            <span th:text="${grupo.aula != null and !grupo.aula.isEmpty()} ? ${grupo.aula} + ' · ' + ${grupo.horario} : '—'"></span>
                        </div>
                    </div>

                    <!-- Tutor actual si ya tiene uno -->
                    <div th:if="${grupo.tutor != null}" class="mt-3 pt-3 border-top border-secondary-subtle">
                        <small class="text-body-secondary d-block mb-1">Tutor actual</small>
                        <div class="d-flex align-items-center gap-2">
                            <img th:if="${grupo.tutor.foto != null}"
                                 th:src="@{/tutor/{foto}(foto=${grupo.tutor.foto})}"
                                 style="width:36px;height:36px;object-fit:cover;border-radius:50%;" alt="foto">
                            <img th:unless="${grupo.tutor.foto != null}"
                                 th:src="@{|https://ui-avatars.com/api/?background=random&color=fff&rounded=true&bold=true&name=${grupo.tutor.nombre}+${grupo.tutor.apellido}|}"
                                 style="width:36px;height:36px;object-fit:cover;border-radius:50%;" alt="foto">
                            <div>
                                <div class="fw-semibold" th:text="${grupo.tutor.nombre} + ' ' + ${grupo.tutor.apellido}"></div>
                                <small class="text-body-secondary" th:text="${grupo.tutor.numeroControl}"></small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Formulario -->
                <form method="post" th:action="@{/grupo/asignar-tutor/{id}(id=${grupo.id})}">

                    <div class="mb-4">
                        <label class="form-label">
                            Tutor <span class="text-danger">*</span>
                        </label>
                        <div class="entity-picker"
                             data-entity="tutor"
                             data-placeholder="Selecciona un tutor..."
                             th:data-current-id="${grupo.tutor != null ? grupo.tutor.id : ''}"
                             th:data-current-text="${grupo.tutor != null ? grupo.tutor.nombre + ' ' + grupo.tutor.apellido : ''}"
                             th:data-current-sub="${grupo.tutor != null ? grupo.tutor.numeroControl : ''}"
                             th:data-current-foto="${grupo.tutor != null and grupo.tutor.foto != null ? grupo.tutor.foto : ''}">
                            <input type="hidden" name="idTutor"
                                   th:value="${grupo.tutor != null ? grupo.tutor.id : ''}">
                        </div>
                        <small class="text-body-secondary mt-1 d-block">
                            Selecciona el tutor que se hará cargo de este grupo.
                        </small>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a th:href="@{/grupo/asignar-tutor}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${grupo.tutor != null} ? 'Cambiar Tutor' : 'Asignar Tutor'"></span>
                        </button>
                    </div>

                </form>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/entity-picker.js}"></script>
<script th:src="@{/js/custom-select.js}"></script>
</body>
</html>
