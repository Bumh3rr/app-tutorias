<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle PAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="card bg-body-secondary w-100" style="max-width: 540px;">
                <div class="card-body p-4">

                    <!-- Imagen y nombre -->
                    <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded-3"
                         style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);">
                        <img th:if="${pat.foto != null}"
                             th:src="@{/pat/{foto}(foto=${pat.foto})}"
                             alt="Foto"
                             style="width:72px; height:72px; object-fit:cover; border-radius:8px;">
                        <img th:unless="${pat.foto != null}"
                             th:src="@{/images/utils/sin_imagen.png}"
                             alt="Sin foto"
                             style="width:72px; height:72px; object-fit:cover; border-radius:8px;">
                        <div>
                            <h5 class="mb-1 fw-semibold" th:text="${pat.nombre}"></h5>
                            <small class="text-secondary font-monospace"
                                   th:text="'ID: #' + ${pat.id}"></small>
                        </div>
                    </div>

                    <!-- Datos -->
                    <div class="vstack gap-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-body-secondary">Descripción</span>
                            <span class="fw-semibold text-end" style="max-width: 60%;"
                                  th:text="${pat.descripcion}"></span>
                        </div>
                        <hr class="my-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-body-secondary">Tipo</span>
                            <span class="badge rounded-pill"
                                  th:text="${pat.esGeneral == 1} ? 'General' : 'Por carrera'"
                                  th:classappend="${pat.esGeneral == 1} ? 'bg-primary' : 'bg-secondary'">
                            </span>
                        </div>
                        <hr class="my-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-body-secondary">Carrera</span>
                            <span class="fw-semibold"
                                  th:text="${pat.carrera != null} ? ${pat.carrera.nombre} : 'General'"></span>
                        </div>
                        <hr class="my-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-body-secondary">Semestre</span>
                            <span class="fw-semibold"
                                  th:text="${pat.semestre != null} ? ${pat.semestre.periodo} + ' ' + ${pat.semestre.anio} : 'Sin asignar'"></span>
                        </div>
                        <hr class="my-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-body-secondary">Estado</span>
                            <span class="badge rounded-pill"
                                  th:text="${pat.activo == 1} ? 'Activo' : 'Inactivo'"
                                  th:classappend="${pat.activo == 1} ? 'badge-active' : 'badge-inactive'">
                            </span>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-2 mt-4">
                        <a th:href="@{/pat/actualizar/{id}(id=${pat.id})}"
                           class="btn btn-primary w-100">Editar</a>
                        <a th:href="@{/pat}" class="btn btn-secondary w-100">Volver</a>
                    </div>

                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
