<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Editar PAT' : 'Agregar PAT'">Formulario PAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 560px;">

                <!-- Encabezado -->
                <div class="mb-4">
                    <h3 class="mb-1" th:text="${isEdit} ? 'Editar PAT' : 'Agregar PAT'"></h3>
                    <p class="text-body-secondary fs-6 mb-0">
                        Crea o edita un Plan de Acción Tutorial. Puede ser general para todas las carreras o específico de una.
                    </p>
                </div>
                <p class="text-body-secondary small mb-4">
                    Los campos marcados con <span class="text-danger fw-bold">*</span> son obligatorios.
                </p>

                <!-- Alertas -->
                <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                    <span th:text="${msg_error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form method="post"
                      enctype="multipart/form-data"
                      th:object="${pat}"
                      th:action="${isEdit} ? @{/pat/actualizar/{id}(id=${pat.id})} : @{/pat/guardar}">

                    <div class="mb-3" th:if="${pat.id != null}">
                        <label class="form-label">ID</label>
                        <input type="number" class="form-control" th:field="*{id}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="nombre" class="form-label">
                            Nombre <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="nombre"
                               class="form-control"
                               th:field="*{nombre}"
                               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                               pattern="[a-zA-ZáéíóúÁÉÍÓÚüÜñÑ0-9 .,;:()\-]+"
                               title="Solo letras, números y puntuación básica"
                               placeholder="ej. PAT General 2025-A">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="3"
                                  placeholder="Describe el contenido y objetivos del PAT..."
                                  th:field="*{descripcion}"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="esGeneral" class="form-label">
                            Tipo de PAT <span class="text-danger">*</span>
                        </label>
                        <select id="esGeneral"
                                class="form-select"
                                th:field="*{esGeneral}"
                                th:classappend="${#fields.hasErrors('esGeneral')} ? 'is-invalid'"
                                onchange="toggleCarrera(this.value)">
                            <option value="">Selecciona...</option>
                            <option value="1">General (para todas las carreras)</option>
                            <option value="0">Por carrera específica</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('esGeneral')}" th:errors="*{esGeneral}"></div>
                    </div>

                    <!-- Carrera (visible solo si es por carrera) -->
                    <div class="mb-3" id="seccionCarrera">
                        <label class="form-label">Carrera</label>
                        <div class="entity-picker"
                             data-entity="carrera"
                             data-placeholder="Sin asignar"
                             data-clearable="true"
                             th:data-current-id="${pat.carrera != null ? pat.carrera.id : ''}"
                             th:data-current-text="${pat.carrera != null ? pat.carrera.nombre : ''}"
                             th:data-current-sub="${pat.carrera != null ? pat.carrera.clave : ''}">
                            <input type="hidden" name="carrera.id"
                                   th:value="${pat.carrera != null ? pat.carrera.id : ''}">
                        </div>
                        <div class="form-text">Requerida cuando el tipo es "Por carrera específica".</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Semestre</label>
                        <div class="entity-picker"
                             data-entity="semestre"
                             data-placeholder="Sin asignar"
                             data-clearable="true"
                             th:data-current-id="${pat.semestre != null ? pat.semestre.id : ''}"
                             th:data-current-text="${pat.semestre != null ? pat.semestre.periodo + ' ' + pat.semestre.anio : ''}">
                            <input type="hidden" name="semestre.id"
                                   th:value="${pat.semestre != null ? pat.semestre.id : ''}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Documento / Portada</label>
                        <div class="fp-wrapper"
                             th:attr="data-current-url=${pat.foto != null} ? @{/pat/{f}(f=${pat.foto})} : ''"
                             th:data-current-name="${pat.foto}">
                            <input type="file" class="fp-file-input" name="fotoFile" accept="image/*">
                            <input type="hidden" th:field="*{foto}">
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a th:href="@{/pat}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${isEdit} ? 'Actualizar' : 'Guardar'"></span>
                        </button>
                    </div>

                </form>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/entity-picker.js}"></script>
<script th:src="@{/js/custom-select.js}"></script>
<script th:src="@{/js/file-picker.js}"></script>
<script>
    function toggleCarrera(valor) {
        const seccion = document.getElementById('seccionCarrera');
        seccion.style.display = valor === '0' ? 'block' : 'none';
    }
    document.addEventListener('DOMContentLoaded', function () {
        const select = document.getElementById('esGeneral');
        if (select) toggleCarrera(select.value);
    });
</script>
</body>
</html>
