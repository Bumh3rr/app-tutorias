<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario PAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="card bg-body-secondary w-100" style="max-width: 560px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"
                        th:text="${isEdit} ? 'Editar PAT' : 'Agregar PAT'"></h3>

                    <form method="post"
                          enctype="multipart/form-data"
                          th:object="${pat}"
                          th:action="${isEdit} ? @{/pat/actualizar/{id}(id=${pat.id})} : @{/pat/guardar}">

                        <!-- ID -->
                        <div class="mb-3" th:if="${pat.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre"
                                   placeholder="ej. PAT General 2025" required th:field="*{nombre}">
                        </div>

                        <!-- Descripción -->
                        <div class="mb-3">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3"
                                      placeholder="Describe el plan de acción tutorial..."
                                      th:field="*{descripcion}"></textarea>
                        </div>

                        <!-- Foto -->
                        <div class="mb-3">
                            <label for="fotoFile" class="form-label">Documento / Portada</label>
                            <input type="file" class="form-control" id="fotoFile"
                                   name="fotoFile" accept="image/*">
                            <small class="text-secondary-emphasis">Acepta: JPG, PNG. Máximo 10MB</small>
                        </div>

                        <!-- Vista previa foto -->
                        <div class="mb-3" th:if="${pat.foto != null}">
                            <label class="form-label">Imagen actual</label>
                            <div>
                                <img th:src="@{/pat/{foto}(foto=${pat.foto})}"
                                     alt="Imagen actual"
                                     style="width:100px; height:100px; object-fit:cover; border-radius:8px;">
                            </div>
                            <input type="hidden" th:field="*{foto}">
                        </div>

                        <!-- Tipo: General o por carrera -->
                        <div class="mb-3">
                            <label for="esGeneral" class="form-label">Tipo de PAT</label>
                            <select class="form-select" id="esGeneral" th:field="*{esGeneral}"
                                    onchange="toggleCarrera(this.value)">
                                <option value="1">General</option>
                                <option value="0">Por carrera</option>
                            </select>
                        </div>

                        <!-- Carrera (visible solo si no es general) -->
                        <div class="mb-3" id="seccionCarrera">
                            <label for="carrera.id" class="form-label">Carrera</label>
                            <select class="form-select" id="carrera.id" name="carrera.id"
                                    th:field="*{carrera.id}">
                                <option value="">Sin asignar</option>
                                <option th:each="c : ${carreras}"
                                        th:value="${c.id}"
                                        th:text="${c.nombre}">
                                </option>
                            </select>
                        </div>

                        <!-- Semestre -->
                        <div class="mb-3">
                            <label for="semestre.id" class="form-label">Semestre</label>
                            <select class="form-select" id="semestre.id" name="semestre.id"
                                    th:field="*{semestre.id}">
                                <option value="">Sin asignar</option>
                                <option th:each="s : ${semestres}"
                                        th:value="${s.id}"
                                        th:text="${s.periodo} + ' ' + ${s.anio}">
                                </option>
                            </select>
                        </div>

                        <!-- Estado -->
                        <div class="mb-4">
                            <label for="activo" class="form-label">Estado</label>
                            <select class="form-select" id="activo" th:field="*{activo}">
                                <option value="1">Activo</option>
                                <option value="0">Inactivo</option>
                            </select>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/pat}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>

                    </form>
                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script>
    function toggleCarrera(valor) {
        const seccion = document.getElementById('seccionCarrera');
        seccion.style.display = valor === '0' ? 'block' : 'none';
    }
    // Ejecutar al cargar para respetar el valor actual
    document.addEventListener('DOMContentLoaded', function () {
        const select = document.getElementById('esGeneral');
        toggleCarrera(select.value);
    });
</script>
</body>
</html>
