<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Detección</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="form-card w-100 mx-auto" style="max-width: 580px;">

                    <h4 class="mb-1">Detección de Necesidades</h4>
                    <p class="text-secondary-emphasis small mb-4">Resultado del instrumento aplicado</p>

                    <!-- Info tutorado -->
                    <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded-3"
                         style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);">
                        <img th:if="${deteccion.tutorado != null and deteccion.tutorado.foto != null}"
                             th:src="@{/tutorado/{foto}(foto=${deteccion.tutorado.foto})}"
                             alt="Foto"
                             class="avatar avatar-xl">
                        <img th:unless="${deteccion.tutorado != null and deteccion.tutorado.foto != null}"
                             th:src="@{|https://ui-avatars.com/api/?background=random&color=fff&rounded=true&bold=true&name=${deteccion.tutorado.nombre}+${deteccion.tutorado.apellido}|}"
                             alt="Sin foto"
                             class="avatar avatar-xl">
                        <div>
                            <h5 class="mb-0 fw-semibold"
                                th:text="${deteccion.tutorado != null} ? ${deteccion.tutorado.nombre} + ' ' + ${deteccion.tutorado.apellido} : 'Sin tutorado'">
                            </h5>
                            <small class="text-secondary font-monospace"
                                   th:text="'ID: #' + ${deteccion.tutorado.id}"></small>
                            <br>
                            <small class="text-secondary"
                                   th:text="${deteccion.tutorado != null} ?  'No. Control: ' + ${deteccion.tutorado.numeroControl} : ''"></small>
                        </div>

                    </div>

                    <!-- Datos generales -->
                    <div class="vstack gap-0 mb-4">
                        <div class="detail-row">
                            <span class="detail-label">ID</span>
                            <span class="detail-value" th:text="${deteccion.id}"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Sesión</span>
                            <span class="detail-value"
                                  th:text="${deteccion.sesion != null} ? 'Semana ' + ${deteccion.sesion.semana} : 'Sin sesión'"></span>
                        </div>
                        <div class="detail-row" th:if="${deteccion.fechaRegistro != null}">
                            <span class="detail-label">Registrado</span>
                            <span class="detail-value">
                                <div th:data-ts="${deteccion.fechaRegistro.time}">
                                    <span class="rel-badge badge rounded-pill badge-sin-asignar">...</span>
                                    <small class="d-block text-body-secondary mt-1"
                                           th:text="${#dates.format(deteccion.fechaRegistro, 'dd/MM/yyyy hh:mm a')}"></small>
                                </div>
                            </span>
                        </div>
                    </div>

                    <!-- Necesidades académicas -->
                    <h6 class="text-body-secondary mb-2">Necesidades Académicas</h6>
                    <div class="row g-2 mb-4">
                        <div class="col-md-4">
                            <div class="p-3 rounded-3 text-center"
                                 th:style="${deteccion.necesidadAlgebra == 1} ? 'background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.3);' : 'background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);'">
                                <div class="fw-medium mb-1">Álgebra</div>
                                <span class="badge rounded-pill"
                                      th:text="${deteccion.necesidadAlgebra == 1} ? 'Requiere apoyo' : 'Sin necesidad'"
                                      th:classappend="${deteccion.necesidadAlgebra == 1} ? 'badge-inactive' : 'bg-secondary'">
                                </span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 rounded-3 text-center"
                                 th:style="${deteccion.necesidadCalculo == 1} ? 'background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.3);' : 'background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);'">
                                <div class="fw-medium mb-1">Cálculo</div>
                                <span class="badge rounded-pill"
                                      th:text="${deteccion.necesidadCalculo == 1} ? 'Requiere apoyo' : 'Sin necesidad'"
                                      th:classappend="${deteccion.necesidadCalculo == 1} ? 'badge-inactive' : 'bg-secondary'">
                                </span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 rounded-3 text-center"
                                 th:style="${deteccion.necesidadDerecho == 1} ? 'background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.3);' : 'background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);'">
                                <div class="fw-medium mb-1">Intro. Derecho</div>
                                <span class="badge rounded-pill"
                                      th:text="${deteccion.necesidadDerecho == 1} ? 'Requiere apoyo' : 'Sin necesidad'"
                                      th:classappend="${deteccion.necesidadDerecho == 1} ? 'badge-inactive' : 'bg-secondary'">
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Otra materia -->
                    <div class="mb-4" th:if="${deteccion.necesidadOtra != null and !deteccion.necesidadOtra.isEmpty()}">
                        <h6 class="text-body-secondary mb-2">Otra materia con dificultad</h6>
                        <div class="p-3 rounded-3"
                             style="background: rgba(255,193,7,0.1); border: 1px solid rgba(255,193,7,0.3);">
                            <span class="fw-medium" th:text="${deteccion.necesidadOtra}"></span>
                        </div>
                    </div>

                    <!-- Necesidades integrales -->
                    <h6 class="text-body-secondary mb-2">Apoyo Integral</h6>
                    <div class="row g-2 mb-4">
                        <div class="col-md-6">
                            <div class="p-3 rounded-3 text-center"
                                 th:style="${deteccion.necesidadEconomica == 1} ? 'background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.3);' : 'background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);'">
                                <div class="fw-medium mb-1">Apoyo Económico</div>
                                <span class="badge rounded-pill"
                                      th:text="${deteccion.necesidadEconomica == 1} ? 'Requiere apoyo' : 'Sin necesidad'"
                                      th:classappend="${deteccion.necesidadEconomica == 1} ? 'badge-inactive' : 'bg-secondary'">
                                </span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 rounded-3 text-center"
                                 th:style="${deteccion.necesidadPsicologica == 1} ? 'background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.3);' : 'background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);'">
                                <div class="fw-medium mb-1">Apoyo Psicológico</div>
                                <span class="badge rounded-pill"
                                      th:text="${deteccion.necesidadPsicologica == 1} ? 'Requiere apoyo' : 'Sin necesidad'"
                                      th:classappend="${deteccion.necesidadPsicologica == 1} ? 'badge-inactive' : 'bg-secondary'">
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Observaciones -->
                    <div class="mb-4"
                         th:if="${deteccion.observaciones != null and !deteccion.observaciones.isEmpty()}">
                        <h6 class="text-body-secondary mb-2">Observaciones del tutor</h6>
                        <div class="p-3 rounded-3"
                             style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);">
                            <p class="mb-0 text-body-secondary small" th:text="${deteccion.observaciones}"></p>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-2 mt-2">
                        <a th:href="@{/deteccion/actualizar/{id}(id=${deteccion.id})}"
                           class="btn btn-primary w-100">Editar</a>
                        <a th:href="@{/deteccion}" class="btn btn-secondary w-100">Volver</a>
                    </div>

            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/rel-time.js}"></script>
</body>
</html>
