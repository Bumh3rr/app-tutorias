<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Asignación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-center">

            <div class="card bg-body-secondary w-100" style="max-width: 560px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"
                        th:text="${isEdit} ? 'Editar Asignación' : 'Agregar Asignación'"></h3>

                    <form method="post"
                          enctype="multipart/form-data"
                          th:object="${asignacion}"
                          th:action="${isEdit} ? @{/asignacion/actualizar/{id}(id=${asignacion.id})} : @{/asignacion/guardar}">

                        <!-- ID -->
                        <div class="mb-3" th:if="${asignacion.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <!-- Tutor -->
                        <div class="mb-3">
                            <label for="tutor.id" class="form-label">Tutor</label>
                            <select class="form-select" id="tutor.id" name="tutor.id"
                                    th:field="*{tutor.id}" required>
                                <option value="">Selecciona un tutor...</option>
                                <option th:each="t : ${tutores}"
                                        th:value="${t.id}"
                                        th:text="${t.nombre} + ' ' + ${t.apellido} + ' — ' + ${t.numeroControl}">
                                </option>
                            </select>
                        </div>

                        <!-- Tutorado -->
                        <div class="mb-3">
                            <label for="tutorado.id" class="form-label">Tutorado</label>
                            <select class="form-select" id="tutorado.id" name="tutorado.id"
                                    th:field="*{tutorado.id}" required>
                                <option value="">Selecciona un tutorado...</option>
                                <option th:each="t : ${tutorados}"
                                        th:value="${t.id}"
                                        th:text="${t.nombre} + ' ' + ${t.apellido} + ' — ' + ${t.numeroControl}">
                                </option>
                            </select>
                        </div>

                        <!-- Semestre -->
                        <div class="mb-3">
                            <label for="semestre.id" class="form-label">Semestre</label>
                            <select class="form-select" id="semestre.id" name="semestre.id"
                                    th:field="*{semestre.id}" required>
                                <option value="">Selecciona un semestre...</option>
                                <option th:each="s : ${semestres}"
                                        th:value="${s.id}"
                                        th:text="${s.periodo} + ' ' + ${s.anio}">
                                </option>
                            </select>
                        </div>

                        <!-- Oficio de asignación (foto) -->
                        <div class="mb-3">
                            <label for="fotoFile" class="form-label">Oficio de Asignación</label>
                            <input type="file" class="form-control" id="fotoFile"
                                   name="fotoFile" accept="image/*">
                            <small class="text-secondary-emphasis">Escaneo del oficio. Acepta: JPG, PNG. Máximo 10MB</small>
                        </div>

                        <!-- Vista previa oficio -->
                        <div class="mb-3" th:if="${asignacion.foto != null}">
                            <label class="form-label">Oficio actual</label>
                            <div>
                                <img th:src="@{/asignacion/{foto}(foto=${asignacion.foto})}"
                                     alt="Oficio actual"
                                     style="width:100px; height:100px; object-fit:cover; border-radius:8px;">
                            </div>
                            <input type="hidden" th:field="*{foto}">
                        </div>

                        <!-- Botones -->
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/asignacion}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>

                    </form>
                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
