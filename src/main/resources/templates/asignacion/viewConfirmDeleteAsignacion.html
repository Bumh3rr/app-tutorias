<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Asignación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="card bg-body-secondary w-100" style="max-width: 500px;" th:if="${asignacion.id} != null">
                <div class="card-body p-4">
                    <h3 class="text-center mb-2">Confirmar Eliminación</h3>
                    <p class="text-center text-muted mb-4">¿Está seguro de que desea eliminar esta asignación?</p>

                    <div class="alert alert-warning">
                        <strong>Asignación a eliminar:</strong>
                        <div class="mt-2">
                            <p class="mb-1"><strong>ID:</strong>
                                <span th:text="${asignacion.id}"></span></p>
                            <p class="mb-1"><strong>Tutor:</strong>
                                <span th:text="${asignacion.tutor != null} ? ${asignacion.tutor.nombre} + ' ' + ${asignacion.tutor.apellido} : 'Sin tutor'"></span>
                            </p>
                            <p class="mb-1"><strong>Tutorado:</strong>
                                <span th:text="${asignacion.tutorado != null} ? ${asignacion.tutorado.nombre} + ' ' + ${asignacion.tutorado.apellido} : 'Sin tutorado'"></span>
                            </p>
                            <p class="mb-0"><strong>Semestre:</strong>
                                <span th:text="${asignacion.semestre != null} ? ${asignacion.semestre.periodo} + ' ' + ${asignacion.semestre.anio} : 'Sin asignar'"></span>
                            </p>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button type="button" class="btn btn-danger flex-grow-1"
                                data-bs-toggle="modal" data-bs-target="#confirmModal">
                            Eliminar
                        </button>
                        <a th:href="@{/asignacion}" class="btn btn-secondary flex-grow-1">Cancelar</a>
                    </div>
                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">¿Confirmar eliminación?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0">La asignación entre
                    <strong th:text="${asignacion.tutor != null} ? ${asignacion.tutor.nombre} + ' ' + ${asignacion.tutor.apellido} : 'el tutor'"></strong>
                    y
                    <strong th:text="${asignacion.tutorado != null} ? ${asignacion.tutorado.nombre} + ' ' + ${asignacion.tutorado.apellido} : 'el tutorado'"></strong>
                    será desactivada del sistema.
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form th:action="@{/asignacion/confirm/delete/{id}(id=${asignacion.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
