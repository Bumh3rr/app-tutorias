<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="card bg-body-secondary w-100" style="max-width: 560px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"
                        th:text="${isEdit} ? 'Editar Tutor' : 'Agregar Tutor'"></h3>

                    <form method="post"
                          enctype="multipart/form-data"
                          th:object="${tutor}"
                          th:action="${isEdit} ? @{/tutor/actualizar/{id}(id=${tutor.id})} : @{/tutor/guardar}">

                        <!-- ID -->
                        <div class="mb-3" th:if="${tutor.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <!-- Nombre y Apellido -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre"
                                       placeholder="ej. Juan" required th:field="*{nombre}">
                            </div>
                            <div class="col-md-6">
                                <label for="apellido" class="form-label">Apellido</label>
                                <input type="text" class="form-control" id="apellido"
                                       placeholder="ej. Pérez" required th:field="*{apellido}">
                            </div>
                        </div>

                        <!-- Número de control -->
                        <div class="mb-3">
                            <label for="numeroControl" class="form-label">Número de Control</label>
                            <input type="text" class="form-control" id="numeroControl"
                                   placeholder="ej. 20400123" required th:field="*{numeroControl}">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email"
                                   placeholder="ej. tutor@tecnm.mx" required th:field="*{email}">
                        </div>

                        <!-- Foto -->
                        <div class="mb-3">
                            <label for="fotoFile" class="form-label">Foto del Tutor</label>
                            <input type="file" class="form-control" id="fotoFile"
                                   name="fotoFile" accept="image/*">
                            <small class="text-secondary-emphasis">Acepta: JPG, PNG. Máximo 10MB</small>
                        </div>

                        <!-- Vista previa foto -->
                        <div class="mb-3" th:if="${tutor.foto != null}">
                            <label class="form-label">Foto actual</label>
                            <div class="d-flex align-items-center gap-3">
                                <img th:src="@{/tutor/{foto}(foto=${tutor.foto})}"
                                     alt="Foto actual"
                                     style="width:80px; height:80px; object-fit:cover; border-radius:50%;">
                            </div>
                            <input type="hidden" th:field="*{foto}">
                        </div>

                        <!-- Aula -->
                        <div class="mb-3">
                            <label for="aula" class="form-label">Aula</label>
                            <input type="text" class="form-control" id="aula"
                                   placeholder="ej. A-101" th:field="*{aula}">
                        </div>

                        <!-- Horario -->
                        <div class="mb-3">
                            <label for="horario" class="form-label">Horario</label>
                            <input type="text" class="form-control" id="horario"
                                   placeholder="ej. Viernes 10:00-11:00" th:field="*{horario}">
                        </div>

                        <!-- Carrera -->
                        <div class="mb-3">
                            <label for="carrera.id" class="form-label">Carrera</label>
                            <select class="form-select" id="carrera.id" name="carrera.id"
                                    th:field="*{carrera.id}">
                                <option value="">Sin asignar</option>
                                <option th:each="c : ${carreras}"
                                        th:value="${c.id}"
                                        th:text="${c.nombre}">
                                </option>
                            </select>
                        </div>

                        <!-- Semestre -->
                        <div class="mb-3">
                            <label for="semestre.id" class="form-label">Semestre</label>
                            <select class="form-select" id="semestre.id" name="semestre.id"
                                    th:field="*{semestre.id}">
                                <option value="">Sin asignar</option>
                                <option th:each="s : ${semestres}"
                                        th:value="${s.id}"
                                        th:text="${s.periodo} + ' ' + ${s.anio}">
                                </option>
                            </select>
                        </div>

                        <!-- Estado -->
                        <div class="mb-4">
                            <label for="activo" class="form-label">Estado</label>
                            <select class="form-select" id="activo" th:field="*{activo}">
                                <option value="1">Activo</option>
                                <option value="0">Inactivo</option>
                            </select>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/tutor}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>

                    </form>
                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
