<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="card bg-body-secondary w-100" style="max-width: 560px;">
                <div class="card-body p-4">

                    <h4 class="mb-1">Detalle de Sesión</h4>
                    <p class="text-secondary-emphasis small mb-4">Información registrada</p>

                    <div th:if="${msg_success}" class="alert alert-success alert-dismissible fade show">
                        <span th:text="${msg_success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div class="detail-row">
                        <span class="detail-label">ID</span>
                        <span class="detail-value" th:text="${sesion.id}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Grupo</span>
                        <span class="detail-value"
                              th:text="${sesion.grupo != null} ? ${sesion.grupo.nombre} : 'Sin grupo'"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Actividad</span>
                        <span class="detail-value"
                              th:text="${sesion.actividad != null} ? ${sesion.actividad.nombre} : 'Sin actividad'"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Semana</span>
                        <span class="badge bg-secondary" th:text="'Semana ' + ${sesion.semana}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Fecha</span>
                        <span class="detail-value"
                              th:text="${sesion.fechaImparticion != null} ? ${#dates.format(sesion.fechaImparticion, 'dd/MM/yyyy')} : '---'"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Estatus</span>
                        <span class="badge rounded-pill"
                              th:text="${sesion.estatusRegistro}"
                              th:classappend="${sesion.estatusRegistro == 'REALIZADA'} ? 'badge-active' :
                                              (${sesion.estatusRegistro == 'CANCELADA'} ? 'badge-inactive' : 'bg-warning text-dark')">
                        </span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Estado</span>
                        <span class="badge rounded-pill"
                              th:text="${sesion.activo == 1} ? 'Activo' : 'Inactivo'"
                              th:classappend="${sesion.activo == 1} ? 'badge-active' : 'badge-inactive'">
                        </span>
                    </div>
                    <div class="detail-row" th:if="${sesion.fechaRegistro != null}">
                        <span class="detail-label">Registrado</span>
                        <span class="detail-value">
                            <div th:data-ts="${sesion.fechaRegistro.time}">
                                <span class="rel-badge badge rounded-pill badge-sin-asignar">...</span>
                                <small class="d-block text-body-secondary mt-1"
                                       th:text="${#dates.format(sesion.fechaRegistro, 'dd/MM/yyyy hh:mm a')}"></small>
                            </div>
                        </span>
                    </div>

                    <!-- Acciones rápidas -->
                    <div class="mt-4 p-3 rounded-3"
                         style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);">
                        <p class="text-body-secondary small mb-2">Acciones de esta sesión</p>
                        <div class="d-flex gap-2 flex-wrap">
                            <a th:href="@{/asistencia/registrar/{id}(id=${sesion.id})}"
                               class="btn btn-success btn-sm">
                                Registrar Asistencia
                            </a>
                            <a th:href="@{/asistencia(tipoBusqueda='sesion', idSesion=${sesion.id})}"
                               class="btn btn-outline-primary btn-sm">
                                Ver Asistencias
                            </a>
                            <a th:href="@{/evidencia/agregar(idSesion=${sesion.id})}"
                               class="btn btn-outline-secondary btn-sm">
                                Subir Evidencia
                            </a>
                            <a th:href="@{/deteccion/agregar(idSesion=${sesion.id})}"
                               class="btn btn-outline-info btn-sm">
                                Registrar Detección de Necesidades
                            </a>
                            <a th:href="@{/reporte/sesion/{id}(id=${sesion.id})}"
                               class="btn btn-outline-warning btn-sm">
                                Reporte de Sesión
                            </a>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <a th:href="@{/sesion/actualizar/{id}(id=${sesion.id})}"
                           class="btn btn-primary w-100">Editar</a>
                        <a th:href="@{/sesion}" class="btn btn-secondary w-100">Volver</a>
                    </div>

                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/rel-time.js}"></script>
</body>
</html>
