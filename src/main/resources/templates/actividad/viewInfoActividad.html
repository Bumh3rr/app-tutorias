<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Actividad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 540px;">

                <!-- Imagen y nombre -->
                <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded-3"
                     style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);">
                    <img th:if="${actividad.foto != null}"
                         th:src="@{/actividad/{foto}(foto=${actividad.foto})}"
                         alt="Foto"
                         style="width:72px; height:72px; object-fit:cover; border-radius:8px;">
                    <img th:unless="${actividad.foto != null}"
                         th:src="@{/images/utils/sin_imagen.png}"
                         alt="Sin foto"
                         style="width:72px; height:72px; object-fit:cover; border-radius:8px;">
                    <div>
                        <h5 class="mb-1 fw-semibold" th:text="${actividad.nombre}"></h5>
                        <small class="text-secondary font-monospace"
                               th:text="'ID: #' + ${actividad.id}"></small>
                    </div>
                </div>

                <!-- Datos -->
                <div class="vstack gap-0">
                    <div class="detail-row">
                        <span class="detail-label">Descripción</span>
                        <span class="detail-value" th:text="${actividad.descripcion}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">PAT</span>
                        <span class="detail-value"
                              th:text="${actividad.pat != null} ? ${actividad.pat.nombre} : 'Sin PAT'"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Semana</span>
                        <span class="detail-value">
                            <span class="badge bg-secondary"
                                  th:text="'Semana ' + ${actividad.semana}"></span>
                        </span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Estado</span>
                        <span class="detail-value">
                            <span class="badge rounded-pill"
                                  th:text="${actividad.activo == 1} ? 'Activo' : 'Inactivo'"
                                  th:classappend="${actividad.activo == 1} ? 'badge-active' : 'badge-inactive'">
                            </span>
                        </span>
                    </div>
                    <div class="detail-row" th:if="${actividad.fechaRegistro != null}">
                        <span class="detail-label">Registrado</span>
                        <span class="detail-value">
                            <div th:data-ts="${actividad.fechaRegistro.time}">
                                <span class="rel-badge badge rounded-pill badge-sin-asignar">...</span>
                                <small class="d-block text-body-secondary mt-1"
                                       th:text="${#dates.format(actividad.fechaRegistro, 'dd/MM/yyyy hh:mm a')}"></small>
                            </div>
                        </span>
                    </div>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2 mt-4">
                    <a th:href="@{/actividad/actualizar/{id}(id=${actividad.id})}"
                       class="btn btn-primary w-100">Editar</a>
                    <a th:href="@{/actividad}" class="btn btn-secondary w-100">Volver</a>
                </div>

            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/rel-time.js}"></script>
</body>
</html>
