<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Editar Tutorado' : 'Agregar Tutorado'">Formulario Tutorado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 560px;">

                <!-- Encabezado -->
                <div class="mb-4">
                    <h3 class="mb-1" th:text="${isEdit} ? 'Editar Tutorado' : 'Agregar Tutorado'"></h3>
                    <p class="text-body-secondary fs-6 mb-0">
                        Registra o actualiza los datos del alumno tutorado del programa.
                    </p>
                </div>
                <p class="text-body-secondary small mb-4">
                    Los campos marcados con <span class="text-danger fw-bold">*</span> son obligatorios.
                </p>

                <!-- Alertas -->
                <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                    <span th:text="${msg_error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form method="post"
                      enctype="multipart/form-data"
                      th:object="${tutorado}"
                      th:action="${isEdit} ? @{/tutorado/actualizar/{id}(id=${tutorado.id})} : @{/tutorado/guardar}">

                    <div class="mb-3" th:if="${tutorado.id != null}">
                        <label class="form-label">ID</label>
                        <input type="number" class="form-control" th:field="*{id}" readonly>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="nombre" class="form-label">
                                Nombre <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="nombre"
                                   class="form-control"
                                   th:field="*{nombre}"
                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                                   pattern="[a-zA-ZáéíóúÁÉÍÓÚüÜñÑ ]+"
                                   title="Solo letras y espacios"
                                   placeholder="ej. María">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="apellido" class="form-label">
                                Apellido <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="apellido"
                                   class="form-control"
                                   th:field="*{apellido}"
                                   th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'"
                                   pattern="[a-zA-ZáéíóúÁÉÍÓÚüÜñÑ ]+"
                                   title="Solo letras y espacios"
                                   placeholder="ej. López">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="numeroControl" class="form-label">
                            Número de Control <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="numeroControl"
                               class="form-control"
                               th:field="*{numeroControl}"
                               th:classappend="${#fields.hasErrors('numeroControl')} ? 'is-invalid'"
                               pattern="[0-9]+"
                               inputmode="numeric"
                               title="Solo dígitos"
                               placeholder="ej. 24400001">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('numeroControl')}" th:errors="*{numeroControl}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">
                            Email <span class="text-danger">*</span>
                        </label>
                        <input type="email" id="email"
                               class="form-control"
                               th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="ej. alumno@tecnm.mx">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Foto del Tutorado</label>
                        <div class="fp-wrapper"
                             th:attr="data-current-url=${tutorado.foto != null} ? @{/tutorado/{f}(f=${tutorado.foto})} : ''"
                             th:data-current-name="${tutorado.foto}">
                            <input type="file" class="fp-file-input" name="fotoFile" accept="image/*">
                            <input type="hidden" th:field="*{foto}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Carrera</label>
                        <select class="form-select" name="carrera.id"
                                th:field="*{carrera.id}">
                            <option value="">Sin asignar</option>
                            <option th:each="c : ${carreras}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Semestre</label>
                        <select class="form-select" name="semestre.id"
                                th:field="*{semestre.id}">
                            <option value="">Sin asignar</option>
                            <option th:each="s : ${semestres}"
                                    th:value="${s.id}"
                                    th:text="${s.periodo} + ' ' + ${s.anio}">
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a th:href="@{/tutorado}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${isEdit} ? 'Actualizar' : 'Guardar'"></span>
                        </button>
                    </div>

                </form>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/custom-select.js}"></script>
<script th:src="@{/js/file-picker.js}"></script>
</body>
</html>
