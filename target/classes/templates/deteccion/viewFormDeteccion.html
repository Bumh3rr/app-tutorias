<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Detección</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <style>
        .necesidad-card {
            background: rgba(255,255,255,0.03);
            border: 0.5px solid rgba(255,255,255,0.08);
            border-radius: var(--bs-border-radius);
            padding: 16px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .necesidad-card:hover { background: rgba(255,255,255,0.06); }
        .necesidad-card.selected {
            background: rgba(220,53,69,0.12);
            border-color: rgba(220,53,69,0.4);
        }
        .necesidad-card .form-check-input { cursor: pointer; }
    </style>
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="form-card w-100 mx-auto" style="max-width: 620px;">
                    <h3 class="text-center mb-1"
                        th:text="${isEdit} ? 'Editar Detección' : 'Registrar Detección de Necesidades'"></h3>
                    <p class="text-center text-body-secondary small mb-2">
                        Instrumento aplicado al tutorado para identificar sus necesidades de apoyo.
                    </p>
                    <p class="text-body-secondary small mb-4">
                        Los campos marcados con <span class="text-danger fw-bold">*</span> son obligatorios.
                    </p>

                    <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                        <span th:text="${msg_error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form method="post"
                          th:object="${deteccion}"
                          th:action="${isEdit} ? @{/deteccion/actualizar/{id}(id=${deteccion.id})} : @{/deteccion/guardar}">

                        <!-- ID -->
                        <div class="mb-3" th:if="${deteccion.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <!-- Tutorado -->
                        <div class="mb-3">
                            <label class="form-label">
                                Tutorado <span class="text-danger">*</span>
                            </label>
                            <div class="entity-picker"
                                 th:classappend="${#fields.hasErrors('tutorado')} ? 'is-invalid'"
                                 data-entity="tutorado"
                                 data-placeholder="Selecciona un tutorado..."
                                 th:data-current-id="${deteccion.tutorado != null ? deteccion.tutorado.id : ''}"
                                 th:data-current-text="${deteccion.tutorado != null ? deteccion.tutorado.nombre + ' ' + deteccion.tutorado.apellido : ''}"
                                 th:data-current-sub="${deteccion.tutorado != null ? deteccion.tutorado.numeroControl : ''}"
                                 th:data-current-foto="${deteccion.tutorado != null and deteccion.tutorado.foto != null ? deteccion.tutorado.foto : ''}">
                                <input type="hidden" name="tutorado.id"
                                       th:value="${deteccion.tutorado != null ? deteccion.tutorado.id : ''}">
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tutorado')}"
                                 th:errors="*{tutorado}"></div>
                        </div>

                        <!-- Sesión -->
                        <div class="mb-3">
                            <label class="form-label">Sesión donde se aplicó</label>
                            <div class="entity-picker"
                                 data-entity="sesion"
                                 data-placeholder="Sin sesión asignada"
                                 data-clearable="true"
                                 th:data-current-id="${deteccion.sesion != null ? deteccion.sesion.id : ''}"
                                 th:data-current-text="${deteccion.sesion != null ? 'Semana ' + deteccion.sesion.semana + (deteccion.sesion.grupo != null ? ' — ' + deteccion.sesion.grupo.nombre : '') : ''}"
                                 th:data-current-sub="${deteccion.sesion != null ? deteccion.sesion.estatusRegistro : ''}">
                                <input type="hidden" name="sesion.id"
                                       th:value="${deteccion.sesion != null ? deteccion.sesion.id : ''}">
                            </div>
                        </div>

                        <!-- Necesidades académicas -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Necesidades Académicas</label>
                            <small class="d-block text-body-secondary mb-3">
                                Selecciona las materias en las que el tutorado presenta deficiencias.
                            </small>
                            <div class="row g-2">

                                <div class="col-md-4">
                                    <div class="necesidad-card" id="card-algebra"
                                         th:classappend="${deteccion.necesidadAlgebra == 1} ? ' selected' : ''">
                                        <div class="form-check">
                                            <input class="form-check-input necesidad-check" type="checkbox"
                                                   id="necesidadAlgebra"
                                                   name="necesidadAlgebra"
                                                   value="1"
                                                   th:checked="${deteccion.necesidadAlgebra == 1}">
                                            <label class="form-check-label w-100" for="necesidadAlgebra">
                                                <span class="fw-medium d-block">Álgebra</span>
                                                <small class="text-body-secondary">Matemáticas básicas</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <div class="necesidad-card" id="card-calculo"
                                         th:classappend="${deteccion.necesidadCalculo == 1} ? ' selected' : ''">
                                        <div class="form-check">
                                            <input class="form-check-input necesidad-check" type="checkbox"
                                                   id="necesidadCalculo"
                                                   name="necesidadCalculo"
                                                   value="1"
                                                   th:checked="${deteccion.necesidadCalculo == 1}">
                                            <label class="form-check-label w-100" for="necesidadCalculo">
                                                <span class="fw-medium d-block">Cálculo Diferencial</span>
                                                <small class="text-body-secondary">Cálculo nivel superior</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <div class="necesidad-card" id="card-derecho"
                                         th:classappend="${deteccion.necesidadDerecho == 1} ? ' selected' : ''">
                                        <div class="form-check">
                                            <input class="form-check-input necesidad-check" type="checkbox"
                                                   id="necesidadDerecho"
                                                   name="necesidadDerecho"
                                                   value="1"
                                                   th:checked="${deteccion.necesidadDerecho == 1}">
                                            <label class="form-check-label w-100" for="necesidadDerecho">
                                                <span class="fw-medium d-block">Intro. al Derecho</span>
                                                <small class="text-body-secondary">Fundamentos legales</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                        <!-- Otra materia -->
                        <div class="mb-4">
                            <label for="necesidadOtra" class="form-label">Otra materia con dificultad</label>
                            <input type="text" class="form-control" id="necesidadOtra"
                                   placeholder="ej. Física, Química, Programación..."
                                   th:field="*{necesidadOtra}">
                        </div>

                        <!-- Necesidades integrales -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Necesidades de Apoyo Integral</label>
                            <small class="d-block text-body-secondary mb-3">
                                Selecciona si el tutorado requiere apoyo adicional.
                            </small>
                            <div class="row g-2">

                                <div class="col-md-6">
                                    <div class="necesidad-card" id="card-economica"
                                         th:classappend="${deteccion.necesidadEconomica == 1} ? ' selected' : ''">
                                        <div class="form-check">
                                            <input class="form-check-input necesidad-check" type="checkbox"
                                                   id="necesidadEconomica"
                                                   name="necesidadEconomica"
                                                   value="1"
                                                   th:checked="${deteccion.necesidadEconomica == 1}">
                                            <label class="form-check-label w-100" for="necesidadEconomica">
                                                <span class="fw-medium d-block">Apoyo Económico</span>
                                                <small class="text-body-secondary">Becas o apoyos financieros</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="necesidad-card" id="card-psicologica"
                                         th:classappend="${deteccion.necesidadPsicologica == 1} ? ' selected' : ''">
                                        <div class="form-check">
                                            <input class="form-check-input necesidad-check" type="checkbox"
                                                   id="necesidadPsicologica"
                                                   name="necesidadPsicologica"
                                                   value="1"
                                                   th:checked="${deteccion.necesidadPsicologica == 1}">
                                            <label class="form-check-label w-100" for="necesidadPsicologica">
                                                <span class="fw-medium d-block">Apoyo Psicológico</span>
                                                <small class="text-body-secondary">Atención psicoterapéutica</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                        <!-- Observaciones -->
                        <div class="mb-4">
                            <label for="observaciones" class="form-label">Observaciones del tutor</label>
                            <textarea class="form-control" id="observaciones" rows="3"
                                      placeholder="Notas adicionales sobre el tutorado..."
                                      th:field="*{observaciones}"></textarea>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/deteccion}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">
                                <span th:text="${isEdit} ? 'Actualizar' : 'Guardar'"></span>
                            </button>
                        </div>

                    </form>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/entity-picker.js}"></script>
<script th:src="@{/js/date-picker.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const checks = document.querySelectorAll('.necesidad-check');
        checks.forEach(check => {
            const card = check.closest('.necesidad-card');
            check.addEventListener('change', function () {
                card.classList.toggle('selected', this.checked);
            });
            card.addEventListener('click', function (e) {
                if (e.target !== check && !e.target.closest('label')) {
                    check.checked = !check.checked;
                    check.dispatchEvent(new Event('change'));
                }
            });
        });
    });
</script>
</body>
</html>
