<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Editar Semestre' : 'Agregar Semestre'">Formulario Semestre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 480px;">

                <!-- Encabezado -->
                <div class="mb-4">
                    <h3 class="mb-1" th:text="${isEdit} ? 'Editar Semestre' : 'Agregar Semestre'"></h3>
                    <p class="text-body-secondary fs-6 mb-0">
                        Define el periodo académico (semestre y año) para organizar grupos y tutorías.
                    </p>
                </div>
                <p class="text-body-secondary small mb-4">
                    Los campos marcados con <span class="text-danger fw-bold">*</span> son obligatorios.
                </p>

                <!-- Alertas -->
                <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                    <span th:text="${msg_error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form method="post"
                      th:object="${semestre}"
                      th:action="${isEdit} ? @{/semestre/actualizar/{id}(id=${semestre.id})} : @{/semestre/guardar}">

                    <div class="mb-3" th:if="${semestre.id != null}">
                        <label class="form-label">ID</label>
                        <input type="number" class="form-control" th:field="*{id}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="periodo" class="form-label">
                            Periodo <span class="text-danger">*</span>
                        </label>
                        <select id="periodo"
                                class="form-select"
                                th:field="*{periodo}"
                                th:classappend="${#fields.hasErrors('periodo')} ? 'is-invalid'">
                            <option value="">Seleccione un periodo</option>
                            <option value="Enero-Junio">Enero-Junio</option>
                            <option value="Agosto-Diciembre">Agosto-Diciembre</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('periodo')}" th:errors="*{periodo}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="anio" class="form-label">
                            Año <span class="text-danger">*</span>
                        </label>
                        <input type="number" id="anio"
                               class="form-control"
                               th:field="*{anio}"
                               th:classappend="${#fields.hasErrors('anio')} ? 'is-invalid'"
                               placeholder="ej. 2025"
                               min="2000" max="2100">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('anio')}" th:errors="*{anio}"></div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a th:href="@{/semestre}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${isEdit} ? 'Actualizar' : 'Guardar'"></span>
                        </button>
                    </div>

                </form>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/custom-select.js}"></script>
</body>
</html>
