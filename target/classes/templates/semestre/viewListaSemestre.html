<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semestres</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="mb-1">Semestres</h3>
                    <p class="text-body-secondary fs-6 mb-0">Gestiona los semestres del programa de tutorías.</p>
                </div>
                <a th:href="@{/semestre/agregar}" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 12.998h-5v5a1 1 0 0 1-2 0v-5H6a1 1 0 0 1 0-2h5v-5a1 1 0 0 1 2 0v5h5a1 1 0 0 1 0 2"/>
                    </svg>
                    Agregar Semestre
                </a>
            </div>

            <!-- Alertas -->
            <div th:if="${msg_success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg_success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${msg_error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Tabla -->
            <div th:if="${semestres != null and !#lists.isEmpty(semestres)}">
                <div class="border rounded-3 p-1">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Periodo</th>
                            <th>Año</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="semestre : ${semestres}">
                            <td th:text="${semestre.id}"></td>
                            <td th:text="${semestre.periodo}"></td>
                            <td th:text="${semestre.anio}"></td>
                            <td>
                                    <span class="badge rounded-pill"
                                          th:text="${semestre.activo == 1} ? 'Activo' : 'Inactivo'"
                                          th:classappend="${semestre.activo == 1} ? 'badge-active' : 'badge-inactive'">
                                    </span>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/semestre/ver/{id}(id=${semestre.id})}"
                                       class="btn btn-sm btn-outline-primary">Ver</a>
                                    <a th:href="@{/semestre/actualizar/{id}(id=${semestre.id})}"
                                       class="btn btn-sm btn-outline-secondary">Editar</a>
                                    <a th:href="@{/semestre/delete/{id}(id=${semestre.id})}"
                                       class="btn btn-sm btn-outline-danger">Eliminar</a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Empty state -->
            <div th:unless="${semestres != null and !#lists.isEmpty(semestres)}"
                 class="text-center py-5 position-relative">
                <img th:src="@{/images/utils/img.png}" alt="No hay semestres" class="mb-4"
                     style="max-width: 300px; width: 100%;">
                <div class="flex-box column-gap-1 position-absolute bottom-30 start-50 translate-middle">
                    <h4 class="mb-3">No hay semestres registrados</h4>
                    <p class="mb-4 text-muted">Agrega un nuevo semestre para comenzar a gestionar el programa.</p>
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/semestre}" class="btn btn-outline-secondary">Refrescar</a>
                        <a th:href="@{/semestre/agregar}" class="btn btn-primary">
                            Agregar Semestre
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                                <path fill="#FFFFFF" d="M18 12.998h-5v5a1 1 0 0 1-2 0v-5H6a1 1 0 0 1 0-2h5v-5a1 1 0 0 1 2 0v5h5a1 1 0 0 1 0 2"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
