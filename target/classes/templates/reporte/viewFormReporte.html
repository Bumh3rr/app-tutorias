<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Reporte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="form-card w-100 mx-auto" style="max-width: 600px;">
                    <h3 class="text-center mb-1"
                        th:text="${isEdit} ? 'Editar Reporte' : 'Registrar Reporte de Sesión'"></h3>
                    <p class="text-center text-body-secondary small mb-4">
                        Reporte de actividades realizadas por el tutor en la sesión.
                    </p>

                    <form method="post"
                          th:object="${reporte}"
                          th:action="${isEdit} ? @{/reporte/actualizar/{id}(id=${reporte.id})} : @{/reporte/guardar}">

                        <div class="mb-3" th:if="${reporte.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Sesión</label>
                            <div class="entity-picker"
                                 data-entity="sesion"
                                 data-placeholder="Selecciona una sesión..."
                                 th:data-current-id="${reporte.sesion != null ? reporte.sesion.id : ''}"
                                 th:data-current-text="${reporte.sesion != null ? 'Semana ' + reporte.sesion.semana + (reporte.sesion.grupo != null ? ' — ' + reporte.sesion.grupo.nombre : '') : ''}"
                                 th:data-current-sub="${reporte.sesion != null ? reporte.sesion.estatusRegistro : ''}">
                                <input type="hidden" name="sesion.id"
                                       th:value="${reporte.sesion != null ? reporte.sesion.id : ''}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="descripcionActividad" class="form-label">Descripción de la actividad realizada</label>
                            <textarea class="form-control" id="descripcionActividad" rows="4"
                                      placeholder="Describe detalladamente la actividad realizada en la sesión..."
                                      required th:field="*{descripcionActividad}"></textarea>
                            <small class="text-body-secondary">Este campo corresponde al Anexo 19 del programa.</small>
                        </div>

                        <div class="mb-3">
                            <label for="alumnosPresentes" class="form-label">Número de alumnos presentes</label>
                            <input type="number" class="form-control" id="alumnosPresentes"
                                   min="0" placeholder="ej. 14"
                                   th:field="*{alumnosPresentes}">
                        </div>

                        <div class="mb-3">
                            <label for="observaciones" class="form-label">Observaciones adicionales</label>
                            <textarea class="form-control" id="observaciones" rows="3"
                                      placeholder="Notas adicionales, incidencias, alumnos canalizados..."
                                      th:field="*{observaciones}"></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/reporte}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>

                    </form>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/entity-picker.js}"></script>
</body>
</html>
