<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="card bg-body-secondary w-100" style="max-width: 560px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"
                        th:text="${isEdit} ? 'Editar Sesión' : 'Agregar Sesión'"></h3>

                    <form method="post"
                          th:object="${sesion}"
                          th:action="${isEdit} ? @{/sesion/actualizar/{id}(id=${sesion.id})} : @{/sesion/guardar}">

                        <div class="mb-3" th:if="${sesion.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="tutor.id" class="form-label">Tutor</label>
                            <select class="form-select" id="tutor.id" name="tutor.id"
                                    th:field="*{tutor.id}" required>
                                <option value="">Selecciona un tutor...</option>
                                <option th:each="t : ${tutores}"
                                        th:value="${t.id}"
                                        th:text="${t.nombre} + ' ' + ${t.apellido}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="actividad.id" class="form-label">Actividad del PAT</label>
                            <select class="form-select" id="actividad.id" name="actividad.id"
                                    th:field="*{actividad.id}">
                                <option value="">Sin actividad asignada</option>
                                <option th:each="a : ${actividades}"
                                        th:value="${a.id}"
                                        th:text="${a.nombre} + ' — Semana ' + ${a.semana}">
                                </option>
                            </select>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label for="semana" class="form-label">Semana</label>
                                <select class="form-select" id="semana" th:field="*{semana}" required>
                                    <option value="">Semana...</option>
                                    <option th:each="i : ${#numbers.sequence(1, 10)}"
                                            th:value="${i}"
                                            th:text="'Semana ' + ${i}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-8">
                                <label for="fechaImparticion" class="form-label">Fecha de impartición</label>
                                <input type="date" class="form-control" id="fechaImparticion"
                                       required th:field="*{fechaImparticion}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="estatusRegistro" class="form-label">Estatus</label>
                            <select class="form-select" id="estatusRegistro" th:field="*{estatusRegistro}">
                                <option value="PENDIENTE">Pendiente</option>
                                <option value="REALIZADA">Realizada</option>
                                <option value="CANCELADA">Cancelada</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="activo" class="form-label">Estado</label>
                            <select class="form-select" id="activo" th:field="*{activo}">
                                <option value="1">Activo</option>
                                <option value="0">Inactivo</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/sesion}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>

                    </form>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
