<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Tutorado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="card bg-body-secondary w-100" style="max-width: 540px;">
                <div class="card-body p-4">

                    <!-- Foto y nombre -->
                    <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded-3"
                         style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);">
                        <img th:if="${tutorado.foto != null}"
                             th:src="@{/tutorado/{foto}(foto=${tutorado.foto})}"
                             alt="Foto"
                             class="avatar avatar-xl">
                        <img th:unless="${tutorado.foto != null}"
                             th:src="@{|https://ui-avatars.com/api/?background=random&color=fff&rounded=true&bold=true&name=${tutorado.nombre}+${tutorado.apellido}|}"
                             alt="Sin foto"
                             class="avatar avatar-xl">
                        <div>
                            <h5 class="mb-1 fw-semibold"
                                th:text="${tutorado.nombre} + ' ' + ${tutorado.apellido}"></h5>
                            <small class="text-secondary font-monospace"
                                   th:text="'ID: #' + ${tutorado.id}"></small>
                        </div>
                    </div>

                    <!-- Datos -->
                    <div class="vstack gap-0">
                        <div class="detail-row">
                            <span class="detail-label">No. Control</span>
                            <span class="detail-value" th:text="${tutorado.numeroControl}"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Email</span>
                            <span class="detail-value" th:text="${tutorado.email}"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Carrera</span>
                            <span class="detail-value"
                                  th:text="${tutorado.carrera != null} ? ${tutorado.carrera.nombre} : 'Sin asignar'"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Semestre</span>
                            <span class="detail-value"
                                  th:text="${tutorado.semestre != null} ? ${tutorado.semestre.periodo} + ' ' + ${tutorado.semestre.anio} : 'Sin asignar'"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Estado</span>
                            <span class="detail-value">
                                <span class="badge rounded-pill"
                                      th:text="${tutorado.activo == 1} ? 'Activo' : 'Inactivo'"
                                      th:classappend="${tutorado.activo == 1} ? 'badge-active' : 'badge-inactive'">
                                </span>
                            </span>
                        </div>
                        <div class="detail-row" th:if="${tutorado.fechaRegistro != null}">
                            <span class="detail-label">Registrado</span>
                            <span class="detail-value">
                                <div th:data-ts="${tutorado.fechaRegistro.time}">
                                    <span class="rel-badge badge rounded-pill badge-sin-asignar">...</span>
                                    <small class="d-block text-body-secondary mt-1"
                                           th:text="${#dates.format(tutorado.fechaRegistro, 'dd/MM/yyyy hh:mm a')}"></small>
                                </div>
                            </span>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-2 mt-4">
                        <a th:href="@{/tutorado/actualizar/{id}(id=${tutorado.id})}"
                           class="btn btn-primary w-100">Editar</a>
                        <a th:href="@{/tutorado}" class="btn btn-secondary w-100">Volver</a>
                    </div>

                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/rel-time.js}"></script>
</body>
</html>
