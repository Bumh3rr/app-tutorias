<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Coordinador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="card bg-body-secondary w-100" style="max-width: 560px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"
                        th:text="${isEdit} ? 'Editar Coordinador' : 'Agregar Coordinador'"></h3>

                    <form method="post"
                          enctype="multipart/form-data"
                          th:object="${coordinador}"
                          th:action="${isEdit} ? @{/coordinador/actualizar/{id}(id=${coordinador.id})} : @{/coordinador/guardar}">

                        <div class="mb-3" th:if="${coordinador.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre"
                                       placeholder="ej. Rosario" required th:field="*{nombre}">
                            </div>
                            <div class="col-md-6">
                                <label for="apellido" class="form-label">Apellido</label>
                                <input type="text" class="form-control" id="apellido"
                                       placeholder="ej. Vega Herrera" required th:field="*{apellido}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="numeroControl" class="form-label">Número de Control</label>
                            <input type="text" class="form-control" id="numeroControl"
                                   placeholder="ej. COORD-001" required th:field="*{numeroControl}">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email"
                                   placeholder="ej. coordinador@tecnm.mx" required th:field="*{email}">
                        </div>

                        <div class="mb-3">
                            <label for="cargo" class="form-label">Cargo</label>
                            <input type="text" class="form-control" id="cargo"
                                   placeholder="ej. Coordinador de Tutoría ISC" th:field="*{cargo}">
                        </div>

                        <div class="mb-3">
                            <label for="fotoFile" class="form-label">Foto del Coordinador</label>
                            <input type="file" class="form-control" id="fotoFile"
                                   name="fotoFile" accept="image/*">
                            <small class="text-secondary-emphasis">Acepta: JPG, PNG. Máximo 10MB</small>
                        </div>

                        <div class="mb-3" th:if="${coordinador.foto != null}">
                            <label class="form-label">Foto actual</label>
                            <div class="d-flex align-items-center gap-3">
                                <img th:src="@{/coordinador/{foto}(foto=${coordinador.foto})}"
                                     alt="Foto actual"
                                     style="width:80px; height:80px; object-fit:cover; border-radius:50%;">
                            </div>
                            <input type="hidden" th:field="*{foto}">
                        </div>

                        <div class="mb-3">
                            <label for="carrera.id" class="form-label">Carrera</label>
                            <select class="form-select" id="carrera.id" name="carrera.id"
                                    th:field="*{carrera.id}">
                                <option value="">Sin asignar</option>
                                <option th:each="c : ${carreras}"
                                        th:value="${c.id}"
                                        th:text="${c.nombre}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="semestre.id" class="form-label">Semestre</label>
                            <select class="form-select" id="semestre.id" name="semestre.id"
                                    th:field="*{semestre.id}">
                                <option value="">Sin asignar</option>
                                <option th:each="s : ${semestres}"
                                        th:value="${s.id}"
                                        th:text="${s.periodo} + ' ' + ${s.anio}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/coordinador}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>

                    </form>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
