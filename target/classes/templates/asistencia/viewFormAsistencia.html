<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="card bg-body-secondary w-100" style="max-width: 560px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"
                        th:text="${isEdit} ? 'Editar Asistencia' : 'Agregar Asistencia'"></h3>

                    <form method="post"
                          th:object="${asistencia}"
                          th:action="${isEdit} ? @{/asistencia/actualizar/{id}(id=${asistencia.id})} : @{/asistencia/guardar}">

                        <div class="mb-3" th:if="${asistencia.id != null}">
                            <label class="form-label">ID</label>
                            <input type="number" class="form-control" th:field="*{id}" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="sesion.id" class="form-label">Sesión</label>
                            <select class="form-select" id="sesion.id" name="sesion.id"
                                    th:field="*{sesion.id}" required>
                                <option value="">Selecciona una sesión...</option>
                                <option th:each="s : ${sesiones}"
                                        th:value="${s.id}"
                                        th:text="'Semana ' + ${s.semana} + ' — ' + ${s.tutor != null ? s.tutor.nombre + ' ' + s.tutor.apellido : 'Sin tutor'}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="tutorado.id" class="form-label">Tutorado</label>
                            <select class="form-select" id="tutorado.id" name="tutorado.id"
                                    th:field="*{tutorado.id}" required>
                                <option value="">Selecciona un tutorado...</option>
                                <option th:each="t : ${tutorados}"
                                        th:value="${t.id}"
                                        th:text="${t.nombre} + ' ' + ${t.apellido} + ' — ' + ${t.numeroControl}">
                                </option>
                            </select>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="presente" class="form-label">Presente</label>
                                <select class="form-select" id="presente" th:field="*{presente}">
                                    <option value="1">Sí</option>
                                    <option value="0">No</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="recuperada" class="form-label">Recuperada</label>
                                <select class="form-select" id="recuperada" th:field="*{recuperada}">
                                    <option value="0">No</option>
                                    <option value="1">Sí</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/asistencia}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>

                    </form>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
