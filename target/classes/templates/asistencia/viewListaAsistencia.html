<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencias</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="mb-1">Asistencias</h3>
                    <p class="text-body-secondary fs-6 mb-0">Control de asistencia semanal de tutorados.</p>
                </div>
            </div>

            <div th:if="${msg_success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg_success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${msg_error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${filtro != null}" class="mb-3">
                <span class="badge bg-info text-dark" th:text="'Filtro: ' + ${filtro}"></span>
                <a th:href="@{/asistencia}" class="btn btn-sm btn-outline-secondary ms-2">Limpiar filtro</a>
            </div>

            <!-- Búsqueda -->
            <div class="search-filters mb-4">
                <h6 class="mb-3">Buscar Asistencias</h6>
                <ul class="nav nav-tabs mb-0" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-todos">Todas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-sesion">Por Sesión</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-tutorado">Historial Tutorado</button>
                    </li>
                </ul>
                <div class="tab-content pt-3">

                    <div class="tab-pane fade show active" id="tab-todos">
                        <a th:href="@{/asistencia}" class="btn btn-primary btn-sm">Ver todas</a>
                    </div>

                    <div class="tab-pane fade" id="tab-sesion">
                        <form method="get" th:action="@{/asistencia}">
                            <input type="hidden" name="tipoBusqueda" value="sesion">
                            <div class="row g-2">
                                <div class="col-md-8">
                                    <select name="idSesion" class="form-select" required>
                                        <option value="">Selecciona una sesión...</option>
                                        <option th:each="s : ${sesiones}"
                                                th:value="${s.id}"
                                                th:text="'Semana ' + ${s.semana} + ' — ' + ${s.tutor != null ? s.tutor.nombre + ' ' + s.tutor.apellido : 'Sin tutor'}"
                                                th:selected="${s.id == idSesionSeleccionada}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-primary w-100">Buscar</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="tab-tutorado">
                        <form method="get" th:action="@{/asistencia}">
                            <input type="hidden" name="tipoBusqueda" value="tutorado">
                            <div class="row g-2">
                                <div class="col-md-8">
                                    <select name="idTutorado" class="form-select" required>
                                        <option value="">Selecciona un tutorado...</option>
                                        <option th:each="t : ${tutorados}"
                                                th:value="${t.id}"
                                                th:text="${t.nombre} + ' ' + ${t.apellido} + ' — ' + ${t.numeroControl}"
                                                th:selected="${t.id == idTutoradoSeleccionado}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-primary w-100">Buscar</button>
                                </div>
                            </div>
                        </form>
                    </div>

                </div>
            </div>

            <!-- Tabla -->
            <div th:if="${asistencias != null and !#lists.isEmpty(asistencias)}">
                <div class="border rounded-3 p-1">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Sesión</th>
                            <th>Tutorado</th>
                            <th>No. Control</th>
                            <th>Presente</th>
                            <th>Recuperada</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="asistencia : ${asistencias}">
                            <td th:text="${asistencia.id}"></td>
                            <td th:text="${asistencia.sesion != null} ? 'Semana ' + ${asistencia.sesion.semana} : '---'"></td>
                            <td th:text="${asistencia.tutorado != null} ? ${asistencia.tutorado.nombre} + ' ' + ${asistencia.tutorado.apellido} : 'Sin tutorado'"></td>
                            <td th:text="${asistencia.tutorado != null} ? ${asistencia.tutorado.numeroControl} : '---'"></td>
                            <td>
                                    <span class="badge rounded-pill"
                                          th:text="${asistencia.presente == 1} ? 'Presente' : 'Ausente'"
                                          th:classappend="${asistencia.presente == 1} ? 'badge-active' : 'badge-inactive'">
                                    </span>
                            </td>
                            <td>
                                    <span class="badge rounded-pill"
                                          th:text="${asistencia.recuperada == 1} ? 'Sí' : 'No'"
                                          th:classappend="${asistencia.recuperada == 1} ? 'bg-warning text-dark' : 'bg-secondary'">
                                    </span>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/asistencia/resumen/{id}(id=${asistencia.tutorado.id})}"
                                       class="btn btn-sm btn-outline-primary">Resumen</a>
                                    <a th:href="@{/asistencia/actualizar/{id}(id=${asistencia.id})}"
                                       class="btn btn-sm btn-outline-secondary">Editar</a>
                                    <a th:href="@{/asistencia/delete/{id}(id=${asistencia.id})}"
                                       class="btn btn-sm btn-outline-danger">Eliminar</a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Empty state -->
            <div th:unless="${asistencias != null and !#lists.isEmpty(asistencias)}"
                 class="text-center py-5 position-relative">
                <img th:src="@{/images/utils/img.png}" alt="No hay asistencias" class="mb-4"
                     style="max-width: 300px; width: 100%;">
                <div class="flex-box column-gap-1 position-absolute bottom-30 start-50 translate-middle">
                    <h4 class="mb-3">No hay asistencias registradas</h4>
                    <p class="mb-4 text-muted">Registra la asistencia desde la vista de sesiones.</p>
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/asistencia}" class="btn btn-outline-secondary">Refrescar</a>
                        <a th:href="@{/sesion}" class="btn btn-primary">Ir a Sesiones</a>
                    </div>
                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
