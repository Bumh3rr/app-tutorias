<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Carrera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 480px;">
                <h4 class="mb-1">Detalle de Carrera</h4>
                <p class="text-secondary-emphasis small mb-4">Información registrada</p>

                <div class="detail-row">
                    <span class="detail-label">ID</span>
                    <span class="detail-value" th:text="${carrera.id}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Nombre</span>
                    <span class="detail-value" th:text="${carrera.nombre}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Clave</span>
                    <span class="detail-value">
                        <span class="badge bg-secondary" th:text="${carrera.clave}"></span>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Estado</span>
                    <span class="detail-value">
                        <span class="badge rounded-pill"
                              th:text="${carrera.activo == 1} ? 'Activo' : 'Inactivo'"
                              th:classappend="${carrera.activo == 1} ? 'badge-active' : 'badge-inactive'">
                        </span>
                    </span>
                </div>
                <div class="detail-row" th:if="${carrera.fechaRegistro != null}">
                    <span class="detail-label">Registrado</span>
                    <span class="detail-value">
                        <div th:data-ts="${carrera.fechaRegistro.time}">
                            <span class="rel-badge badge rounded-pill badge-sin-asignar">...</span>
                            <small class="d-block text-body-secondary mt-1"
                                   th:text="${#dates.format(carrera.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></small>
                        </div>
                    </span>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <a th:href="@{/carrera/actualizar/{id}(id=${carrera.id})}"
                       class="btn btn-primary w-100">Editar</a>
                    <a th:href="@{/carrera}" class="btn btn-secondary w-100">Volver</a>
                </div>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/rel-time.js}"></script>
</body>
</html>
