<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main">

            <div class="page-header">
                <div>
                    <h3 class="mb-1" th:text="${tutor.nombre} + ' ' + ${tutor.apellido}">Tutor</h3>
                    <p class="text-body-secondary fs-6 mb-0"
                       th:text="'No. Control: ' + ${tutor.numeroControl}"></p>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/tutor/actualizar/{id}(id=${tutor.id})}" class="btn btn-primary">Editar</a>
                    <a th:href="@{/tutor}" class="btn btn-secondary">Volver</a>
                </div>
            </div>

            <div th:if="${msg_success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg_success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${msg_error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">

                <!-- Datos del tutor -->
                <div class="col-md-4">
                    <div class="card bg-body-secondary border-0 h-100">
                        <div class="card-body p-4">

                            <div class="text-center mb-4">
                                <img th:if="${tutor.foto != null}"
                                     th:src="@{/tutor/{foto}(foto=${tutor.foto})}"
                                     alt="Foto"
                                     class="avatar avatar-xl">
                                <img th:unless="${tutor.foto != null}"
                                     th:src="@{|https://ui-avatars.com/api/?background=random&color=fff&rounded=true&bold=true&size=96&name=${tutor.nombre}+${tutor.apellido}|}"
                                     alt="Sin foto"
                                     class="avatar avatar-xl">
                            </div>

                            <h5 class="mb-3">Datos del Tutor</h5>
                            <div class="vstack gap-0">
                                <div class="detail-row">
                                    <span class="detail-label">ID</span>
                                    <span class="detail-value" th:text="${tutor.id}"></span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Nombre</span>
                                    <span class="detail-value"
                                          th:text="${tutor.nombre} + ' ' + ${tutor.apellido}"></span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">No. Control</span>
                                    <span class="detail-value" th:text="${tutor.numeroControl}"></span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Email</span>
                                    <span class="detail-value" th:text="${tutor.email}"></span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Estado</span>
                                    <span class="detail-value">
                                        <span class="badge rounded-pill"
                                              th:text="${tutor.activo == 1} ? 'Activo' : 'Inactivo'"
                                              th:classappend="${tutor.activo == 1} ? 'badge-active' : 'badge-inactive'">
                                        </span>
                                    </span>
                                </div>
                                <div class="detail-row" th:if="${tutor.fechaRegistro != null}">
                                    <span class="detail-label">Registrado</span>
                                    <span class="detail-value">
                                        <div th:data-ts="${tutor.fechaRegistro.time}">
                                            <span class="rel-badge badge rounded-pill badge-sin-asignar">...</span>
                                            <small class="d-block text-body-secondary mt-1"
                                                   th:text="${#dates.format(tutor.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></small>
                                        </div>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Grupos y tutorados del tutor -->
                <div class="col-md-8">
                    <div class="card bg-body-secondary border-0">
                        <div class="card-body p-4">

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0">Grupos del Tutor</h5>
                                <a th:href="@{/grupo/agregar(idTutor=${tutor.id})}" class="btn btn-sm btn-primary">
                                    Nuevo Grupo
                                </a>
                            </div>

                            <div th:if="${grupos != null and !#lists.isEmpty(grupos)}"
                                 class="vstack gap-3">
                                <div th:each="grupo : ${grupos}"
                                     class="p-3 rounded-3"
                                     style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <div>
                                            <h6 class="mb-1 fw-semibold" th:text="${grupo.nombre}"></h6>
                                            <small class="text-body-secondary"
                                                   th:text="(${grupo.carrera != null} ? ${grupo.carrera.nombre} : 'Sin carrera') + ' — ' + (${grupo.semestre != null} ? ${grupo.semestre.periodo} + ' ' + ${grupo.semestre.anio} : 'Sin semestre')">
                                            </small>
                                            <div class="d-flex gap-3 mt-1">
                                                <small class="text-body-secondary"
                                                       th:if="${grupo.aula != null and !grupo.aula.isBlank()}"
                                                       th:text="'Aula: ' + ${grupo.aula}"></small>
                                                <small class="text-body-secondary"
                                                       th:if="${grupo.diaSemana != null and !grupo.diaSemana.isBlank()}"
                                                       th:text="${grupo.diaSemana}"></small>
                                                <small class="text-body-secondary"
                                                       th:if="${grupo.horario != null and !grupo.horario.isBlank()}"
                                                       th:text="${grupo.horario}"></small>
                                            </div>
                                        </div>
                                        <div class="d-flex gap-2 flex-shrink-0">
                                            <a th:href="@{/grupo/asignar/{id}(id=${grupo.id})}"
                                               class="btn btn-sm btn-outline-primary">
                                                Asignar Tutorados
                                            </a>
                                            <a th:href="@{/grupo/ver/{id}(id=${grupo.id})}"
                                               class="btn btn-sm btn-outline-secondary">
                                                Ver
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div th:unless="${grupos != null and !#lists.isEmpty(grupos)}"
                                 class="text-center py-4 text-body-secondary">
                                <p class="mb-2">Este tutor no tiene grupos activos asignados.</p>
                                <a th:href="@{/grupo/agregar(idTutor=${tutor.id})}" class="btn btn-sm btn-outline-primary">
                                    Crear grupo
                                </a>
                            </div>

                        </div>
                    </div>
                </div>

            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/rel-time.js}"></script>
</body>
</html>
