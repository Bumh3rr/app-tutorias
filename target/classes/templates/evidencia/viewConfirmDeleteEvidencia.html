<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desactivar Evidencia | Sistema Tutorías</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">
            <div class="card danger-card w-100" style="max-width: 500px;" th:if="${evidencia.id} != null">
                <div class="card-body p-4">
                    <h3 class="text-center mb-2">Desactivar Evidencia</h3>
                    <p class="text-center text-muted mb-4">El registro será <strong>desactivado</strong> y dejará de aparecer en el sistema. Esta acción puede revertirse desde la base de datos.</p>

                    <div class="alert alert-warning">
                        <strong>Evidencia a desactivar:</strong>
                        <div class="mt-2">
                            <p class="mb-1"><strong>ID:</strong> <span th:text="${evidencia.id}"></span></p>
                            <p class="mb-1"><strong>Sesión:</strong>
                                <span th:text="${evidencia.sesion != null} ? 'Semana ' + ${evidencia.sesion.semana} : '---'"></span></p>
                            <p class="mb-1"><strong>Fecha subida:</strong>
                                <span th:text="${evidencia.fechaSubida != null} ? ${#dates.format(evidencia.fechaSubida, 'dd/MM/yyyy')} : '---'"></span></p>
                            <p class="mb-0"><strong>Estatus:</strong>
                                <span th:text="${evidencia.estatusValidacion}"></span></p>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button type="button" class="btn btn-danger flex-grow-1"
                                data-bs-toggle="modal" data-bs-target="#confirmModal">Sí, desactivar</button>
                        <a th:href="@{/evidencia}" class="btn btn-secondary flex-grow-1">Cancelar</a>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">¿Confirmar desactivación?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0">La evidencia de la
                    <strong th:text="${evidencia.sesion != null} ? 'Semana ' + ${evidencia.sesion.semana} : 'sesión'"></strong>
                    será desactivada del sistema.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form th:action="@{/evidencia/confirm/delete/{id}(id=${evidencia.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Sí, desactivar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
