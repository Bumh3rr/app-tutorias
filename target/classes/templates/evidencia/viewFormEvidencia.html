<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Editar Evidencia' : 'Subir Evidencia'">Formulario Evidencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/sidebar.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/fragment::sidebar}"></div>
    <div class="app-content">
        <main class="app-main d-flex justify-content-center align-items-start">

            <div class="form-card w-100 mx-auto" style="max-width: 560px;">

                <!-- Encabezado -->
                <div class="mb-4">
                    <h3 class="mb-1" th:text="${isEdit} ? 'Editar Evidencia' : 'Subir Evidencia'"></h3>
                    <p class="text-body-secondary fs-6 mb-0">
                        Adjunta el archivo de evidencia fotográfica de una sesión de tutoría realizada.
                    </p>
                </div>
                <p class="text-body-secondary small mb-4">
                    Los campos marcados con <span class="text-danger fw-bold">*</span> son obligatorios.
                </p>

                <!-- Alertas -->
                <div th:if="${msg_error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                    <span th:text="${msg_error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form method="post"
                      enctype="multipart/form-data"
                      th:object="${evidencia}"
                      th:action="${isEdit} ? @{/evidencia/actualizar/{id}(id=${evidencia.id})} : @{/evidencia/guardar}">

                    <div class="mb-3" th:if="${evidencia.id != null}">
                        <label class="form-label">ID</label>
                        <input type="number" class="form-control" th:field="*{id}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Sesión <span class="text-danger">*</span>
                        </label>
                        <div class="entity-picker"
                             data-entity="sesion"
                             data-placeholder="Selecciona una sesión..."
                             th:data-current-id="${evidencia.sesion != null ? evidencia.sesion.id : ''}"
                             th:data-current-text="${evidencia.sesion != null ? 'Semana ' + evidencia.sesion.semana + (evidencia.sesion.grupo != null ? ' — ' + evidencia.sesion.grupo.nombre : '') : ''}"
                             th:data-current-sub="${evidencia.sesion != null ? evidencia.sesion.estatusRegistro : ''}">
                            <input type="hidden" name="sesion.id"
                                   th:value="${evidencia.sesion != null ? evidencia.sesion.id : ''}">
                        </div>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('sesion')}"
                             th:errors="*{sesion}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Archivo de evidencia</label>
                        <div class="fp-wrapper"
                             th:attr="data-current-url=${evidencia.archivoUrl != null} ? @{/evidencia/{f}(f=${evidencia.archivoUrl})} : ''"
                             th:data-current-name="${evidencia.archivoUrl}">
                            <input type="file" class="fp-file-input" name="archivoFile" accept="image/*">
                            <input type="hidden" th:field="*{archivoUrl}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notasCoordinador" class="form-label">Notas del coordinador</label>
                        <textarea class="form-control" id="notasCoordinador" rows="3"
                                  placeholder="Observaciones o notas adicionales..."
                                  th:field="*{notasCoordinador}"></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="estatusValidacion" class="form-label">Estatus de validación</label>
                        <select class="form-select" id="estatusValidacion" th:field="*{estatusValidacion}">
                            <option value="PENDIENTE">Pendiente</option>
                            <option value="VALIDADA">Validada</option>
                            <option value="RECHAZADA">Rechazada</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a th:href="@{/evidencia}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${isEdit} ? 'Actualizar' : 'Guardar'"></span>
                        </button>
                    </div>

                </form>
            </div>

        </main>
        <footer th:replace="~{fragments/fragment::footer}"></footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/entity-picker.js}"></script>
<script th:src="@{/js/custom-select.js}"></script>
<script th:src="@{/js/file-picker.js}"></script>
</body>
</html>
